<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Login - MediCore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 5rem;">
        <div class="card">
            <h2 style="text-align:center; margin-bottom: 2rem;">Doctor Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="e.g. sushma" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••" required>
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
            <p id="error" style="color:red; font-size:0.8rem; margin-top:1rem; text-align:center; display:none;"></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch('http://localhost:5000/api/doctor/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            
            if (res.ok) {
                localStorage.setItem('doctorId', data.doctorId);
                localStorage.setItem('doctorName', data.name);
                window.location.href = 'dashboard.html';
            } else {
                const err = document.getElementById('error');
                err.innerText = data.error;
                err.style.display = 'block';
            }
        };
    </script>
</body>
</html>
