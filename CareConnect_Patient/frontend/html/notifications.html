<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - CareConnect</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <div class="header">
            <div class="page-title">
                <h1>Notifications</h1>
                <p>Stay updated on your health alerts</p>
            </div>
            <div class="header-actions">
                <button class="icon-btn notification-badge"><i class="fa-solid fa-bell"></i></button>
            </div>
        </div>

        <div id="notifContainer" style="display: flex; flex-direction: column; gap: 16px; max-width: 800px;">
            <!-- Notifications load here -->
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const patientId = checkAuth();
        renderSidebar('notifications');

        async function loadNotifications() {
            try {
                // Use getAppointments or other route if getNotifications is missing server-side logic, 
                // but since this is existing code, I assume getNotifications works or fails gracefully.
                const notifs = await api.getNotifications(patientId);
                const container = document.getElementById('notifContainer');
                
                if (!notifs || notifs.length === 0) {
                    container.innerHTML = '<div class="card text-center"><p class="text-muted" style="padding: 24px;">You have no new notifications.</p></div>';
                    return;
                }
                
                container.innerHTML = notifs.map(n => `
                    <div class="card" style="border-left: 4px solid var(--accent); display: flex; align-items: flex-start; gap: 16px; padding: 20px;">
                        <div style="background: rgba(14, 165, 233, 0.1); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 1.2rem; flex-shrink: 0;">
                            <i class="fa-solid fa-bell"></i>
                        </div>
                        <div style="flex: 1;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                                <strong style="color: var(--dark); font-size: 1.05rem;">${n.type ? n.type.toUpperCase() : 'ALERT'}</strong>
                                <small class="text-muted" style="font-weight: 500;">${new Date(n.timestamp).toLocaleString()}</small>
                            </div>
                            <p class="text-muted" style="line-height: 1.5; font-size: 0.95rem;">${n.message}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('notifContainer').innerHTML = '<div class="card text-center text-danger" style="padding: 24px;">Failed to load notifications.</div>';
            }
        }

        loadNotifications();
    </script>
</body>
</html>
