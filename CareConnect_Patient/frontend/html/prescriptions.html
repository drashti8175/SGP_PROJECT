<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Prescriptions - CareConnect</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <div class="header">
            <div class="page-title">
                <h1>My Prescriptions</h1>
                <p>View your medical advice and prescribed medicines</p>
            </div>
            <div class="header-actions">
                <button class="icon-btn notification-badge" onclick="window.location.href='notifications.html'"><i class="fa-regular fa-bell"></i></button>
            </div>
        </div>

        <div id="rxContainer" class="card-grid">
            <!-- Prescriptions will load here -->
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const patientId = checkAuth();
        renderSidebar('prescriptions');

        async function loadPrescriptions() {
            try {
                const rx = await api.getPrescriptions();
                const container = document.getElementById('rxContainer');
                
                if (!rx || rx.length === 0) {
                    container.innerHTML = '<div class="card text-center" style="grid-column: 1/-1;"><p class="text-muted" style="padding: 24px;">No prescriptions found.</p></div>';
                    return;
                }
                
                container.innerHTML = rx.map(p => `
                    <div class="card" style="display: flex; flex-direction: column;">
                        <div class="section-header" style="margin-bottom: 16px;">
                            <h3 style="color: var(--dark); font-size: 1.15rem;">Dr. ${p.doctor_name || 'Unknown'}</h3>
                            <span class="badge badge-checkin" style="font-size: 0.8rem;"><i class="fa-regular fa-calendar"></i> ${new Date(p.created_at || p.date).toLocaleDateString(undefined, {month:'short', day:'numeric'})}</span>
                        </div>
                        <div style="flex: 1; background: var(--secondary); padding: 16px; border-radius: 12px; border: 1px solid var(--border);">
                           <p style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; margin-bottom: 8px;"><i class="fa-solid fa-pills" style="color:var(--accent)"></i> Medical Advice</p>
                           <p class="text-main" style="white-space: pre-line; line-height: 1.6; font-size: 0.95rem;">${p.details || 'No details provided'}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('rxContainer').innerHTML = '<div class="card text-center text-danger" style="grid-column: 1/-1; padding: 24px;">Failed to load prescriptions.</div>';
            }
        }

        loadPrescriptions();
    </script>
</body>
</html>
