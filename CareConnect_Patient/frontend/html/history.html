<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment History - CareConnect</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <div class="header">
            <div class="page-title">
                <h1>Appointment History</h1>
                <p>Review your past medical visits</p>
            </div>
            <div class="header-actions">
                <button class="icon-btn notification-badge" onclick="window.location.href='notifications.html'"><i class="fa-regular fa-bell"></i></button>
            </div>
        </div>

        <div class="card p-0" style="padding: 0; overflow: hidden;">
            <table class="modern-table" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background: var(--secondary);">
                        <th style="padding: 16px; text-align: left; border-bottom: 2px solid var(--border); font-weight: 600; color: var(--text-muted);">Date</th>
                        <th style="padding: 16px; text-align: left; border-bottom: 2px solid var(--border); font-weight: 600; color: var(--text-muted);">Doctor</th>
                        <th style="padding: 16px; text-align: left; border-bottom: 2px solid var(--border); font-weight: 600; color: var(--text-muted);">Specialization</th>
                        <th style="padding: 16px; text-align: left; border-bottom: 2px solid var(--border); font-weight: 600; color: var(--text-muted);">Status</th>
                    </tr>
                </thead>
                <tbody id="historyTable">
                    <tr><td colspan="4" class="text-center text-muted" style="padding: 24px;">Loading history...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const patientId = checkAuth();
        renderSidebar('history');

        async function loadHistory() {
            try {
                const appts = await api.getAppointments();
                const tbody = document.getElementById('historyTable');
                
                if (!appts || appts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted" style="padding: 24px;">No past appointments found.</td></tr>';
                    return;
                }

                const getBadgeClass = (status) => {
                    if (status === 'Completed') return 'badge-checkin';
                    if (status === 'Cancelled') return 'badge-emergency';
                    if (status === 'Waiting') return 'badge-waiting';
                    return 'badge'; // fallback
                };
                
                tbody.innerHTML = appts.map(a => `
                    <tr>
                        <td style="padding: 16px; border-bottom: 1px solid var(--border); font-weight: 500;">
                            ${new Date(a.date).toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'})}
                        </td>
                        <td style="padding: 16px; border-bottom: 1px solid var(--border); color: var(--dark);">
                            Dr. ${a.doctor_name || a.doctor_id?.name || 'Unknown'}
                        </td>
                        <td style="padding: 16px; border-bottom: 1px solid var(--border); color: var(--text-muted);">
                            ${a.specialization || a.doctor_id?.specialization || 'N/A'}
                        </td>
                        <td style="padding: 16px; border-bottom: 1px solid var(--border);">
                            <span class="badge ${getBadgeClass(a.status)}" style="display:inline-block; padding: 6px 10px;">${a.status}</span>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                document.getElementById('historyTable').innerHTML = '<tr><td colspan="4" class="text-center text-danger" style="padding: 24px;">Failed to load history.</td></tr>';
            }
        }

        loadHistory();
    </script>
</body>
</html>
