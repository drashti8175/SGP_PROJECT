<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - CareConnect</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="sidebar glass-panel" id="sidebar-container"></div>
        
        <div class="main-content">
            <h1 class="mb-4">Profile Settings</h1>

            <div class="glass-panel card" style="max-width: 500px;">
                <form id="profileForm">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="pName" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email <small class="text-muted">(Cannot be changed)</small></label>
                        <input type="email" id="pEmail" class="form-control" disabled>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Contact Number</label>
                        <input type="tel" id="pPhone" class="form-control" required>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="fa-solid fa-floppy-disk"></i> Save Changes
                    </button>
                </form>
                <p id="profileMsg" class="mt-2"></p>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const patientId = checkAuth();
        renderSidebar('profile');

        async function loadProfile() {
            try {
                const patient = await api.getPatient(patientId);
                document.getElementById('pName').value = patient.name;
                document.getElementById('pEmail').value = patient.email;
                document.getElementById('pPhone').value = patient.phone;
            } catch (err) {
                console.error('Error loading profile');
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('pName').value;
            const phone = document.getElementById('pPhone').value;
            
            try {
                const res = await api.updateProfile({ id: patientId, name, phone });
                if (res.success) {
                    localStorage.setItem('careconnect_name', name);
                    const msg = document.getElementById('profileMsg');
                    msg.className = 'mt-2 text-success';
                    msg.innerText = 'Profile updated successfully!';
                    setTimeout(() => msg.innerText = '', 3000);
                }
            } catch (err) {
                document.getElementById('profileMsg').className = 'mt-2 text-danger';
                document.getElementById('profileMsg').innerText = 'Error updating profile.';
            }
        });

        loadProfile();
    </script>
</body>
</html>
