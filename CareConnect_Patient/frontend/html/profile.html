<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - CareConnect</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <div class="header">
            <div class="page-title">
                <h1>Profile Settings</h1>
                <p>Manage your account and contact details</p>
            </div>
            <div class="header-actions">
                <button class="icon-btn notification-badge" onclick="window.location.href='notifications.html'"><i class="fa-regular fa-bell"></i></button>
            </div>
        </div>

        <div class="dashboard-layout">
            <div class="card" style="max-width: 600px;">
                <form id="profileForm">
                    <div class="form-group mb-4">
                        <label class="form-label" style="font-weight: 500;">Full Name</label>
                        <input type="text" id="pName" class="form-input" required>
                    </div>
                    <div class="form-group mb-4">
                        <label class="form-label" style="font-weight: 500;">Email Address</label>
                        <input type="email" id="pEmail" class="form-input" disabled style="background-color: var(--secondary); cursor: not-allowed;">
                        <small class="text-muted mt-2" style="display: block; font-size: 0.8rem;"><i class="fa-solid fa-lock"></i> Your primary email address cannot be changed.</small>
                    </div>
                    <div class="form-group mb-4">
                        <label class="form-label" style="font-weight: 500;">Contact Number</label>
                        <input type="tel" id="pPhone" class="form-input" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                        <i class="fa-solid fa-floppy-disk"></i> Save Changes
                    </button>
                </form>
                <div id="profileMsg" class="mt-4 text-center"></div>
            </div>
            
            <div class="layout-section">
                <div class="card" style="background: linear-gradient(135deg, rgba(16,185,129,0.1) 0%, rgba(20,184,166,0.1) 100%); border-color: rgba(16,185,129,0.2);">
                    <h3 style="color: var(--dark); font-size: 1.1rem; margin-bottom: 12px;"><i class="fa-solid fa-shield-halved text-success"></i> Account Privacy</h3>
                    <p class="text-muted" style="font-size: 0.9rem; line-height: 1.6;">Your medical records and personal details are encrypted and securely stored. We prioritize your privacy above all else.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const patientId = checkAuth();
        renderSidebar('profile');

        async function loadProfile() {
            try {
                const patient = await api.getPatient(patientId);
                document.getElementById('pName').value = patient.name;
                document.getElementById('pEmail').value = patient.email;
                document.getElementById('pPhone').value = patient.phone;
            } catch (err) {
                console.error('Error loading profile');
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('pName').value;
            const phone = document.getElementById('pPhone').value;
            
            try {
                const res = await api.updateProfile({ id: patientId, name, phone });
                if (res.success) {
                    localStorage.setItem('careconnect_name', name);
                    const msg = document.getElementById('profileMsg');
                    msg.className = 'mt-2 text-success';
                    msg.innerText = 'Profile updated successfully!';
                    setTimeout(() => msg.innerText = '', 3000);
                }
            } catch (err) {
                document.getElementById('profileMsg').className = 'mt-2 text-danger';
                document.getElementById('profileMsg').innerText = 'Error updating profile.';
            }
        });

        loadProfile();
    </script>
</body>
</html>
