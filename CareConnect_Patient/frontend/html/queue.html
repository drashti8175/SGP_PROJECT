<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Queue - CareConnect</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div id="sidebar-container"></div>
    
    <div class="main-content">
        <div class="header">
            <div class="page-title">
                <h1>Track Queue Status</h1>
                <p>Monitor live queue position and wait times</p>
            </div>
            <div class="header-actions">
                <button class="icon-btn notification-badge" onclick="window.location.href='notifications.html'"><i class="fa-regular fa-bell"></i></button>
            </div>
        </div>

        <div class="card" style="margin-bottom: 24px; max-width: 600px;">
            <div class="form-group mb-0">
                <label class="form-label">Select Doctor to Check Queue</label>
                <select id="doctorSelectQueue" class="form-select" onchange="checkQueue()">
                    <option value="">Choose a Doctor...</option>
                </select>
            </div>
        </div>

        <div id="queueResult" class="card-grid" style="display: none;">
            <div class="card stat-card" style="align-items: center; justify-content: center; text-align: center; padding: 32px;">
                <h3 class="text-muted" style="margin-bottom: 12px; font-weight: 500;">Your Position</h3>
                <h1 style="font-size: 3.5rem; color: var(--accent); line-height: 1;" id="totalQueue">-</h1>
            </div>
            <div class="card stat-card" style="align-items: center; justify-content: center; text-align: center; padding: 32px;">
                <h3 class="text-muted" style="margin-bottom: 12px; font-weight: 500;">Currently Serving Token</h3>
                <h1 style="font-size: 3.5rem; color: var(--success); line-height: 1;" id="servingToken">-</h1>
            </div>
        </div>
        <div id="queueMsg" class="mt-4"></div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const patientId = checkAuth();
        renderSidebar('queue');

        async function loadDoctors() {
            try {
                const doctors = await api.getDoctors();
                const select = document.getElementById('doctorSelectQueue');
                select.innerHTML += doctors.map(d => `<option value="${d.doctor_id}">Dr. ${d.name} (${d.specialization})</option>`).join('');
            } catch (err) {
                console.error(err);
            }
        }
        
        async function checkQueue() {
            const docId = document.getElementById('doctorSelectQueue').value;
            const resDiv = document.getElementById('queueResult');
            const msg = document.getElementById('queueMsg');
            
            if (!docId) {
                resDiv.style.display = 'none';
                msg.innerHTML = '';
                return;
            }
            
            try {
                const res = await api.getQueueStatus(docId);
                resDiv.style.display = 'grid';
                msg.innerHTML = '';
                
                document.getElementById('totalQueue').innerText = res.queue_position ? `#${res.queue_position}` : '-';
                document.getElementById('servingToken').innerText = res.current_serving_token !== 'None' ? `#${res.current_serving_token}` : 'Waiting';

                if (res.patients_ahead !== null && res.queue_position !== undefined) {
                    msg.innerHTML = `
                    <div class="card text-center" style="max-width: 600px; padding: 24px; background: rgba(14, 165, 233, 0.05); border-color: rgba(14, 165, 233, 0.2);">
                        <p style="font-size: 1.25rem; color: var(--dark); margin-bottom: 8px; font-weight: 600;">
                            <i class="fa-solid fa-hourglass-half" style="color: var(--accent);"></i> 
                            Estimated Wait: ${res.estimated_wait_time_mins} mins
                        </p>
                        <p class="text-muted" style="font-size: 0.95rem;">
                            There are <strong>${res.patients_ahead}</strong> patients ahead of you.
                        </p>
                    </div>`;
                } else {
                    msg.innerHTML = `
                    <div class="card text-center" style="max-width: 600px; padding: 24px;">
                        <p style="font-size: 1.1rem; color: var(--text-muted);">
                            <i class="fa-solid fa-circle-info"></i> You do not currently have a token waiting with this doctor today.
                        </p>
                    </div>`;
                }
            } catch (err) {
                resDiv.style.display = 'none';
                msg.innerHTML = `<div class="card text-center text-danger" style="max-width: 600px;">Failed to load queue status.</div>`;
            }
        }

        loadDoctors();
    </script>
</body>
</html>
